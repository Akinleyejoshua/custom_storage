<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Gallery - Custom Storage Gateway</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-gray-800 text-white p-4 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold"><i class="fas fa-cloud"></i> Media Gateway</h1>
      <div class="flex gap-2">
        <a href="/docs" class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg transition flex items-center gap-2">
          <i class="fas fa-book"></i> Docs
        </a>
        <a href="/upload" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition flex items-center gap-2">
          <i class="fas fa-upload"></i> Upload
        </a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto p-6">
    <div class="mb-6 flex justify-between items-center">
      <h2 class="text-2xl font-semibold text-gray-800">Gallery</h2>
      <div class="flex gap-2">
        <button onclick="loadAssets()" class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded text-white transition">
          <i class="fas fa-sync-alt"></i> Refresh
        </button>
      </div>
    </div>

    <!-- Loading indicator -->
    <div id="loading" class="hidden text-center py-12">
      <i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i>
      <p class="mt-2 text-gray-600">Loading assets...</p>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-12 bg-white rounded-lg shadow">
      <i class="fas fa-folder-open text-6xl text-gray-300 mb-4"></i>
      <p class="text-gray-600 text-lg">No media assets uploaded yet.</p>
      <a href="/upload" class="inline-block mt-4 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition">
        Upload your first file
      </a>
    </div>

    <!-- Gallery grid -->
    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    </div>

    <!-- Pagination -->
    <div id="pagination" class="mt-8 flex justify-center gap-2 hidden">
    </div>
  </main>

  <!-- Copy URL Modal -->
  <div id="url-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
      <h3 class="text-lg font-semibold mb-4">Public URL</h3>
      <p id="url-filename" class="text-gray-600 text-sm mb-2"></p>
      <div class="flex gap-2">
        <input type="text" id="url-input" readonly class="flex-1 border rounded px-3 py-2 text-sm bg-gray-50">
        <button onclick="copyUrl()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition">
          <i class="fas fa-copy"></i>
        </button>
      </div>
      <button onclick="closeModal()" class="mt-4 w-full bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded transition">
        Close
      </button>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let totalPages = 1;
    let currentUrl = '';

    async function loadAssets(page = 1) {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('gallery').innerHTML = '';
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('pagination').classList.add('hidden');

      try {
        const response = await fetch(`api.php?page=${page}&limit=20`);
        const text = await response.text();
        
        // Debug: log the raw response
        console.log('Raw response:', text);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const result = text ? JSON.parse(text) : { success: false, data: [], pagination: { page: 1, limit: 20, total: 0, totalPages: 1 } };

        if (!result.success && result.error) throw new Error(result.error);

        currentPage = result.pagination.page;
        totalPages = result.pagination.totalPages;
        const assets = result.data || [];

        if (assets.length === 0) {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('empty-state').classList.remove('hidden');
          return;
        }

        const gallery = document.getElementById('gallery');
        assets.forEach(asset => {
          const card = createAssetCard(asset);
          gallery.appendChild(card);
        });

        renderPagination();
        document.getElementById('loading').classList.add('hidden');
      } catch (error) {
        console.error('Failed to load assets:', error);
        alert('Failed to load assets');
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function createAssetCard(asset) {
      const card = document.createElement('div');
      card.className = 'bg-white rounded-lg shadow overflow-hidden hover:shadow-lg transition';

      const isImg = asset.mimeType.startsWith('image/');
      const mediaEl = isImg
        ? `<img src="${asset.publicUrl}" alt="${asset.originalFilename}" class="w-full h-48 object-cover">`
        : `<video src="${asset.publicUrl}" class="w-full h-48 object-cover" controls preload="metadata"></video>`;

      card.innerHTML = `
        <div class="relative">
          ${mediaEl}
          <span class="absolute top-2 right-2 bg-black bg-opacity-60 text-white text-xs px-2 py-1 rounded">
            ${isImg ? 'Image' : 'Video'}
          </span>
        </div>
        <div class="p-4">
          <h3 class="font-semibold text-gray-800 truncate" title="${asset.originalFilename}">${asset.originalFilename}</h3>
          <p class="text-sm text-gray-500 mt-1">${formatBytes(asset.fileSize)}</p>
          <div class="mt-3 flex gap-2">
            <button onclick="showUrl('${asset.publicUrl}', '${asset.originalFilename}')" class="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-800 px-3 py-2 rounded text-sm transition">
              <i class="fas fa-link"></i> Copy URL
            </button>
            <button onclick="deleteAsset('${asset.assetId}')" class="bg-red-100 hover:bg-red-200 text-red-800 px-3 py-2 rounded text-sm transition" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        </div>
      `;

      return card;
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function renderPagination() {
      const container = document.getElementById('pagination');
      container.innerHTML = '';

      if (totalPages <= 1) return;

      container.classList.remove('hidden');

      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = `px-3 py-2 rounded ${i === currentPage ? 'bg-blue-600 text-white' : 'bg-white hover:bg-gray-100'}`;
        btn.onclick = () => loadAssets(i);
        container.appendChild(btn);
      }
    }

    function showUrl(url, filename) {
      currentUrl = url;
      document.getElementById('url-filename').textContent = filename;
      document.getElementById('url-input').value = url;
      document.getElementById('url-modal').classList.remove('hidden');
    }

    function copyUrl() {
      navigator.clipboard.writeText(currentUrl).then(() => {
        alert('URL copied to clipboard!');
      }).catch(() => {
        document.getElementById('url-input').select();
        document.execCommand('copy');
        alert('URL copied to clipboard!');
      });
    }

    function closeModal() {
      document.getElementById('url-modal').classList.add('hidden');
    }

    async function deleteAsset(assetId) {
      if (!confirm('Are you sure you want to delete this asset?')) return;

      try {
        const response = await fetch(`api.php/${assetId}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json'
          }
        });
        const result = await response.json();

        if (!result.success && !response.ok) {
          throw new Error(result.error || 'Failed to delete');
        }

        alert('Asset deleted successfully');
        loadAssets(currentPage);
      } catch (error) {
        console.error('Delete error:', error);
        alert('Failed to delete asset');
      }
    }

    // Close modal on outside click
    document.getElementById('url-modal').addEventListener('click', (e) => {
      if (e.target.id === 'url-modal') closeModal();
    });

    // Initial load
    loadAssets();
  </script>
</body>
</html>
